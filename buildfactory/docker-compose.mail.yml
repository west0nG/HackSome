# Domain-level singleton mail ingress. This Compose project is independent of
# every Company stack and must be started once with `make mail-up`.

name: foundagent-mail

services:
  mail-router:
    build:
      context: .
      dockerfile: peripheral/email/Dockerfile
    image: foundagent/mail-router:latest
    container_name: foundagent-mail-router
    restart: unless-stopped
    env_file:
      - path: vm/.env.local
        required: false
    environment:
      MAIL_GLOBAL_ROOT: /mail-global
      COMPANIES_STATE_ROOT: /companies-state
      R2_BUCKET: ${R2_BUCKET:-foundagent-mail}
      MAIL_POLL_INTERVAL: ${MAIL_POLL_INTERVAL:-30}
    volumes:
      - ./state:/companies-state
      - ./state/_mail:/companies-state/_mail:ro
      - ./state/_mail:/mail-global:ro
