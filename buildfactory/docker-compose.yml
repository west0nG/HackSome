# One autonomous Hackathon Team: resident Lead, one Worker, one fresh Verifier.
# The only Agent-visible shared state is project/ mounted at /project.

name: ${TEAM:-hackathon-team}

x-agent: &agent
  image: foundagent/cua-agent:latest
  restart: unless-stopped
  env_file:
    - path: vm/.env.local
      required: false
    - path: accounts/${ACCOUNT:-foundagent}/secrets.env
      required: false
  volumes:
    - ./agent:/opt/foundagent-orch/agent:ro
    - ./agents:/opt/foundagent-orch/agents:ro
    - ./orchestration:/opt/foundagent-orch/orchestration:ro
    - ./state/${TEAM:-hackathon-team}/project:/project
    - ./state/${TEAM:-hackathon-team}/sessions/lead:/home/kasm-user/.claude
    - ./accounts/${ACCOUNT:-foundagent}:/account:ro
    - ./vm/docker/agent_startup.sh:/dockerstartup/custom_startup.sh:ro
  depends_on:
    hub:
      condition: service_healthy

x-manager: &manager
  build:
    context: orchestration
    dockerfile: Dockerfile.control
  image: foundagent/control-plane:latest
  working_dir: ${PWD}
  restart: unless-stopped
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ${PWD}:${PWD}
  environment: &manager-env
    PYTHONPATH: ${PWD}
    FOUNDAGENT_HOST_REPO: ${PWD}
    TEAM_MODE: "1"
    TEAM: ${TEAM:-hackathon-team}
    ACCOUNT: ${ACCOUNT:-foundagent}
    TEAM_STATE_ROOT: ${PWD}/state/${TEAM:-hackathon-team}
    TEAM_NETWORK: ${TEAM:-hackathon-team}_default
    HUB_URL: http://hub:8910
  depends_on:
    hub:
      condition: service_healthy

services:
  hub:
    build:
      context: orchestration
      dockerfile: Dockerfile.control
    image: foundagent/control-plane:latest
    container_name: ${TEAM:-hackathon-team}-hub
    working_dir: /opt/foundagent-orch
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - python3 -m orchestration.team_hub 2>&1 | tee -a /state/telemetry/services/hub.log
    environment:
      PYTHONPATH: /opt/foundagent-orch
      TEAM: ${TEAM:-hackathon-team}
      TEAM_STATE_ROOT: /state
      HUB_PORT: "8910"
      HUB_TICK_SECS: ${HUB_TICK_SECS:-0.5}
    volumes:
      - ./orchestration:/opt/foundagent-orch/orchestration:ro
      - ./state/${TEAM:-hackathon-team}:/state
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8910/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  lead:
    <<: *agent
    container_name: ${TEAM:-hackathon-team}-lead
    labels:
      hacksome.team: ${TEAM:-hackathon-team}
      hacksome.kind: lead
    environment:
      PYTHONPATH: /opt/foundagent-orch
      AGENT_KEY: lead
      AGENT_KIND: lead
      AGENT_SPEC: /opt/foundagent-orch/agents/lead.yaml
      AGENT_CHARTER: /opt/foundagent-orch/agents/assets/lead-charter.md
      AGENT_LOOP_MODULE: orchestration.lead_loop
      AGENT_HEARTBEAT_SECS: ${LEAD_HEARTBEAT_SECS:-900}
      AGENT_CLAUDE_TIMEOUT: ${AGENT_CLAUDE_TIMEOUT:-3600}
      HUB_URL: http://hub:8910
      CLAUDE_CONFIG_DIR: /home/kasm-user/.claude
      CODEX_HOME: /home/kasm-user/.claude/codex
      AGENT_SESSION_FILE: /home/kasm-user/.claude/session_id
      CLAUDE_CODE_DISABLE_AUTO_MEMORY: "1"
  worker-manager:
    <<: *manager
    container_name: ${TEAM:-hackathon-team}-worker-manager
    command:
      - sh
      - -c
      - python3 -m orchestration.worker_manager 2>&1 | tee -a ${PWD}/state/${TEAM:-hackathon-team}/telemetry/services/worker-manager.log
    environment:
      <<: *manager-env
      WORKER_MAX: "1"
      WORKER_TURN_TIMEOUT_SECS: ${WORKER_TURN_TIMEOUT_SECS:-3600}

  verifier-manager:
    <<: *manager
    container_name: ${TEAM:-hackathon-team}-verifier-manager
    command:
      - sh
      - -c
      - python3 -m orchestration.verifier_runtime 2>&1 | tee -a ${PWD}/state/${TEAM:-hackathon-team}/telemetry/services/verifier-manager.log
    environment:
      <<: *manager-env
      VERIFIER_MAX: "1"
      VERIFIER_TURN_TIMEOUT_SECS: ${VERIFIER_TURN_TIMEOUT_SECS:-3600}
